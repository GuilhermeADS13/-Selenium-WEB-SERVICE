<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaaS Jurídico - Contestação</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <section class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h3 mb-3">Automação de Contestação Jurídica</h1>
          <p class="text-muted">
            MVP com FastAPI + OpenAI para gerar contestações com linguagem jurídica formal.
          </p>

          <form id="contestacao-form" class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="tipo_acao">Tipo de ação</label>
              <input id="tipo_acao" class="form-control" required placeholder="Ex.: Cobrança" />
            </div>
            <div class="col-md-6">
              <label class="form-label" for="nome_parte_autora">Parte autora</label>
              <input id="nome_parte_autora" class="form-control" placeholder="Nome da parte autora" />
            </div>
            <div class="col-md-6">
              <label class="form-label" for="nome_parte_re">Parte ré</label>
              <input id="nome_parte_re" class="form-control" placeholder="Nome da parte ré" />
            </div>
            <div class="col-12">
              <label class="form-label" for="fatos">Fatos</label>
              <textarea id="fatos" class="form-control" rows="4" required></textarea>
            </div>
            <div class="col-12">
              <label class="form-label" for="pedidos_autor">Pedidos do autor</label>
              <textarea id="pedidos_autor" class="form-control" rows="3" required></textarea>
            </div>
            <div class="col-12">
              <button id="submit-btn" class="btn btn-primary" type="submit">Gerar contestação</button>
            </div>
          </form>
        </div>
      </section>

      <section class="card mt-4">
        <div class="card-body">
          <h2 class="h5">Resposta</h2>
          <pre id="resultado" class="small bg-dark text-light p-3 rounded" style="min-height: 180px"></pre>
        </div>
      </section>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
